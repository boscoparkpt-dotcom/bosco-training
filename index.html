<h1 style="text-align:center;font-size:22px;margin-bottom:2px">BOSCO'S TRAINING</h1>
<div id="app"><div id="loading">Loading training data...</div></div>

<script>
const DATA_URL = 'data.json?v=' + Date.now();

// ── State ──
const state = {
  view: 'week',       // day | week | month
  weekIdx: 0,         // index into weeks[]
  dayDate: null,       // ISO date string for daily view
  monthDate: null,     // "YYYY-MM" for month view
  selectedDate: null,  // ISO date tapped in calendar
  data: null
};

// ── Helpers ──
function getIcon(sport) {
  const icons = {swim:'\u{1F3CA}',bike:'\u{1F6B4}',run:'\u{1F3C3}',rest:'\u{1F319}',strength:'\u{1F4AA}'};
  return icons[sport] || '\u{1F4AA}';
}

function daysUntil(dateStr) {
  const diff = new Date(dateStr + 'T00:00:00') - new Date();
  return Math.max(0, Math.ceil(diff / (1000*60*60*24)));
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseISO(s) { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }

function formatLongDate(iso) {
  const d = parseISO(iso);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
}

function formatMonthYear(ym) {
  const [y,m] = ym.split('-').map(Number);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[m-1] + ' ' + y;
}

function allDays() {
  const days = [];
  if (!state.data) return days;
  state.data.weeks.forEach(w => w.days.forEach(d => days.push(d)));
  return days;
}

function findDayByDate(iso) {
  return allDays().find(d => d.isoDate === iso) || null;
}

function allDates() {
  return allDays().map(d => d.isoDate);
}

function isCurrentWeek(week) {
  const today = todayISO();
  return week.days.some(d => d.isoDate === today);
}

// ── Hash Persistence ──
function readHash() {
  const h = location.hash.slice(1);
  if (h === 'day' || h === 'week' || h === 'month' || h === 'lib') state.view = h;
}

function writeHash() {
  location.hash = state.view;
}

// ── Init State ──
function initState() {
  const today = todayISO();
  const weeks = state.data.weeks;

  // Find current week
  let cwIdx = weeks.findIndex(w => isCurrentWeek(w));
  if (cwIdx === -1) cwIdx = 0;
  state.weekIdx = cwIdx;
  state.dayDate = today;

  const td = new Date();
  state.monthDate = td.getFullYear() + '-' + String(td.getMonth()+1).padStart(2,'0');
  state.selectedDate = null;

  readHash();
}

// ── Render Dispatch ──
function render() {
  const app = document.getElementById('app');
  let html = '';

  // View tabs
  html += renderTabs();

  // Race banner (always shown)
  html += renderRaceBanner();

  if (state.view === 'day') html += renderDailyView();
  else if (state.view === 'week') html += renderWeeklyView();
  else if (state.view === 'month') html += renderMonthlyView();
  else if (state.view === 'lib') html += renderLibraryView();

  app.innerHTML = html;
  writeHash();
}

// ── View Tabs ──
function renderTabs() {
  const tabs = [
    {id:'day', label:'Day'},
    {id:'week', label:'Week'},
    {id:'month', label:'Month'},
    {id:'lib', label:'Lib'}
  ];
  let h = '<div class="view-tabs">';
  tabs.forEach(t => {
    const active = state.view === t.id ? ' active' : '';
    h += `<div class="view-tab${active}" onclick="switchView('${t.id}')">${t.label}</div>`;
  });
  h += '</div>';
  return h;
}

function switchView(v) {
  state.view = v;

  // Library view doesn't need sync logic
  if (v === 'lib') { render(); return; }

  // Sync: if switching to week from day, jump to the week containing dayDate
  if (v === 'week' && state.dayDate) {
    const idx = state.data.weeks.findIndex(w => w.days.some(d => d.isoDate === state.dayDate));
    if (idx !== -1) state.weekIdx = idx;
  }
  // If switching to day from week, pick first day of current week (or today if in week)
  if (v === 'day') {
    const week = state.data.weeks[state.weekIdx];
    const today = todayISO();
    const todayInWeek = week.days.find(d => d.isoDate === today);
    state.dayDate = todayInWeek ? today : week.days[0].isoDate;
  }
  // If switching to month from day, sync month
  if (v === 'month' && state.dayDate) {
    state.monthDate = state.dayDate.slice(0,7);
  }

  render();
}

// ── Race Banner ──
function renderRaceBanner() {
  const races = state.data.races;
  if (!races || !races.length) return '';
  const r = races[0];
  let h = `<div class="race-banner" onclick="this.classList.toggle('open')">
    <div class="race-name">${r.name}</div>
    <div class="race-date">${r.type} \u00B7 ${r.date.split('-')[0]}</div>
    <div class="race-countdown">${daysUntil(r.date)} days to go</div>`;
  if (r.goal) {
    h += `<div class="race-goal">GOAL \u00B7 ${r.goal.total}</div>`;
    if (r.goal.tier) h += `<div class="race-goal-tier">${r.goal.tier}</div>`;
    h += `<div class="goal-hint">tap for splits \u203A</div>`;
    h += `<div class="race-splits">`;
    r.goal.splits.forEach(s => {
      h += `<div class="split-row">
        <span class="split-label">${s.label}${s.dist ? ' <span style="font-weight:500;opacity:.7">'+s.dist+'</span>' : ''}</span>
        <span><span class="split-time">${s.time}</span>${s.pace ? '<span class="split-pace">'+s.pace+'</span>' : ''}</span>
      </div>`;
    });
    if (r.goal.gaps) {
      h += `<div class="gaps-box"><div class="gaps-title">\u26A0 Gaps to Close</div>`;
      if (r.goal.gaps.swim) h += `<div class="gap-row"><span class="gap-sport">Swim</span>${r.goal.gaps.swim}</div>`;
      if (r.goal.gaps.bike) h += `<div class="gap-row"><span class="gap-sport">Bike</span>${r.goal.gaps.bike}</div>`;
      if (r.goal.gaps.run) h += `<div class="gap-row"><span class="gap-sport">Run</span>${r.goal.gaps.run}</div>`;
      h += `</div>`;
    }
    if (r.goal.scenarios && r.goal.scenarios.length) {
      h += `<div class="scen-title">\u{1F3AF} Finish Scenarios</div>`;
      h += `<div class="scen-table">`;
      h += `<div class="scen-row"><div class="scen-cell-h">Tier</div><div class="scen-cell-h">Total</div><div class="scen-cell-h">Swim</div><div class="scen-cell-h">Bike</div><div class="scen-cell-h">Run</div></div>`;
      r.goal.scenarios.forEach(s => {
        const cls = s.name === 'Realistic' ? ' realistic' : '';
        h += `<div class="scen-row${cls}">`;
        h += `<div class="scen-name">${s.name}</div>`;
        h += `<div class="scen-cell">${s.total}</div>`;
        h += `<div class="scen-cell">${s.swim}</div>`;
        h += `<div class="scen-cell">${s.bike}</div>`;
        h += `<div class="scen-cell">${s.run}</div>`;
        h += `</div>`;
      });
      h += `</div>`;
      if (r.goal.currentEstimate) {
        h += `<div class="scen-current">\u{1F4CD} Current fitness estimate: ${r.goal.currentEstimate}</div>`;
      }
    }
    if (r.goal.phases && r.goal.phases.length) {
      h += `<div class="phase-title">\u{1F4C5} 5-Phase Roadmap</div>`;
      h += `<div class="phase-list">`;
      r.goal.phases.forEach(p => {
        h += `<div class="phase-row">`;
        h += `<div class="phase-name">${p.name} \u2022 ${p.weeks}</div>`;
        h += `<div class="phase-meta">${p.dates}</div>`;
        if (p.focus) h += `<div class="phase-focus">${p.focus}</div>`;
        h += `</div>`;
      });
      h += `</div>`;
    }
    if (r.goal.milestones && r.goal.milestones.length) {
      h += `<div class="ms-title">\u{1F4CC} Key Milestones</div>`;
      h += `<div class="ms-list">`;
      r.goal.milestones.forEach(m => {
        const md = m.date.slice(5);
        const dleft = daysUntil(m.date);
        h += `<div class="ms-row"><span class="ms-date">${md}</span><span style="flex:1">${m.label}</span><span class="ms-d">D-${dleft}</span></div>`;
      });
      h += `</div>`;
    }
    if (r.goal.equipment && r.goal.equipment.length) {
      h += `<div class="eq-title">\u{1F6B4} Equipment</div>`;
      h += `<div class="eq-list">`;
      r.goal.equipment.forEach(e => {
        const icon = e.status === 'owned' ? '\u2713' : '\u25CB';
        h += `<span class="eq-tag ${e.status}">${icon} ${e.item}</span>`;

      h += `</div>`;
    }
    h += `</div>`;

  h += `</div>`;
  return h;

// ── Day Card HTML (shared) ──
function renderDayCard(day, forceOpen) {
  const today = todayISO();
  const isToday = day.isoDate === today;
  const todayClass = isToday ? ' today' : '';
  const completedClass = day.completed ? ' completed' : '';
  const injuryClass = day.injury ? ' injury' : '';
  const missedClass = day.missed ? ' missed' : '';
  const brickClass = day.brick ? ' brick' : '';
  const openClass = (forceOpen || isToday) ? ' open' : '';

  let h = `<div class="day-card${todayClass}${completedClass}${injuryClass}${missedClass}${brickClass}${openClass}" id="${day.id}" onclick="this.classList.toggle('open')">`;
  h += `<div class="day-header">`;
  h += `<div class="day-left"><span class="day-icon">${getIcon(day.sport)}</span><div><span class="day-name">${day.name}</span><span class="day-date">${day.date}</span></div></div>`;
  h += `<div class="badge-row">`;
  h += `<span class="day-sport ${day.sport}">${day.sportLabel}</span>`;
  if (day.secondSportLabel) {
    h += `<span class="day-sport ${day.secondSport}">${day.secondSportLabel}</span>`;
  }
  if (day.brick) {
    const flow = day.brickFlow ? ` ${day.brickFlow.toUpperCase()}` : '';
    h += `<span class="brick-badge">\u{1F501} BRICK${flow}</span>`;
  }
  if (day.sessionGrade) {
    const gradeClass = day.sessionGrade.charAt(0).toLowerCase();
    h += `<span class="session-grade ${gradeClass}">${day.sessionGrade}</span>`;
  }
  if (day.changed) {
    h += `<span class="day-sport changed">CHANGED</span>`;
  }
  h += `<span class="arrow">\u203A</span></div>`;
  h += `</div>`;

  h += `<div class="day-details">`;
  const w = day.workout;
  h += `<div class="workout-title">${w.title}</div>`;
  h += `<div class="workout-meta">${w.meta}</div>`;
  if (w.sets && w.sets.length) {
    h += `<ul class="workout-sets">`;
    w.sets.forEach(s => { h += `<li>${s}</li>`; });
    h += `</ul>`;
  }
  if (w.equipment && w.equipment.length) {
    h += `<div class="equipment">`;
    w.equipment.forEach(e => { h += `<span>${e}</span>`; });
    h += `</div>`;
  }
  if (w.note) {
    const noteClass = day.missed ? 'missed-note' : (day.injury ? 'injury-note' : 'note');
    h += `<div class="${noteClass}">${w.note}</div>`;
  }

  // Actual vs Planned (when both exist)
  if (day.actual && day.planned) {
    h += `<div class="actual-vs-plan">`;
    h += `<div class="col"><div class="col-title">Planned</div><div class="col-val">${day.planned}</div></div>`;
    h += `<div class="col"><div class="col-title">Actual</div><div class="col-val">${day.actual}</div></div>`;
    h += `</div>`;
  }

  // Wellness check-in
  if (day.wellness) {
    h += `<div class="section-divider">\u{1F31F} Wellness Check</div>`;
    h += `<div class="wellness-grid">`;
    const cells = [
      {key:'sleep', label:'Sleep', unit:'h'},
      {key:'energy', label:'Energy', unit:'/10'},
      {key:'soreness', label:'Soreness', unit:'/10'},
      {key:'hrv', label:'HRV', unit:''},
      {key:'mood', label:'Mood', unit:''}
    ];
    cells.forEach(c => {
      const v = day.wellness[c.key];
      let cls = '';
      if (typeof v === 'number') {
        if (c.key === 'energy' || c.key === 'sleep') cls = v >= 7 ? ' good' : v >= 5 ? ' warn' : ' bad';
        else if (c.key === 'soreness') cls = v <= 3 ? ' good' : v <= 6 ? ' warn' : ' bad';
      }
      const valStr = (v === null || v === undefined || v === '') ? '<span class="w-val empty">—</span>' : `<span class="w-val">${v}${c.unit}</span>`;
      h += `<div class="wellness-cell${cls}">${valStr}<div class="w-label">${c.label}</div></div>`;
    });
    h += `</div>`;
    if (day.wellness.notes) h += `<div class="wellness-notes">${day.wellness.notes}</div>`;
  }

  // Nutrition log
  if (day.nutrition) {
    h += `<div class="section-divider">\u{1F37D}️ Nutrition</div>`;
    h += `<div class="nutri-list">`;
    const meals = [
      {key:'breakfast', label:'Breakfast'},
      {key:'lunch', label:'Lunch'},
      {key:'dinner', label:'Dinner'},
      {key:'snacks', label:'Snacks'},
      {key:'fueling', label:'Fueling'},
      {key:'hydration', label:'Hydration'}
    ];
    meals.forEach(m => {
      const v = day.nutrition[m.key];
      const empty = (v === null || v === undefined || v === '');
      const valStr = empty ? '<span class="nutri-val empty">—</span>' : `<span class="nutri-val">${v}</span>`;
      h += `<div class="nutri-row"><span class="nutri-label">${m.label}</span>${valStr}</div>`;
    });
    h += `</div>`;
  }

  // Coach's Note
  if (day.coachNote) {
    h += `<div class="coach-note"><div class="coach-title">\u{1F3CB}️ Coach’s Note</div>${day.coachNote}</div>`;
  }

  h += `</div></div>`;
  return h;
}

// ── DAILY VIEW ──
function renderDailyView() {
  const all = allDays();
  const idx = all.findIndex(d => d.isoDate === state.dayDate);
  const day = idx !== -1 ? all[idx] : null;
  const hasPrev = idx > 0;
  const hasNext = idx < all.length - 1;

  let h = '<div class="daily-view">';

  // Nav bar
  h += `<div class="nav-bar">`;
  h += `<button class="nav-btn" onclick="navDay(-1)" ${!hasPrev?'disabled':''}>\u2039</button>`;
  h += `<div class="nav-title">${day ? formatLongDate(day.isoDate) : state.dayDate}</div>`;
  h += `<button class="nav-btn" onclick="navDay(1)" ${!hasNext?'disabled':''}>\u203A</button>`;
  h += `</div>`;

  if (day) {
    h += renderDayCard(day, true);
  } else {
    h += `<div class="empty-state"><div class="empty-icon">\u{1F319}</div><div>No workout scheduled</div></div>`;
  }

  h += '</div>';
  return h;
}

function navDay(dir) {
  const all = allDays();
  const idx = all.findIndex(d => d.isoDate === state.dayDate);
  const next = idx + dir;
  if (next >= 0 && next < all.length) {
    state.dayDate = all[next].isoDate;
    render();
  }
}

// ── WEEKLY VIEW ──
function renderWeeklyView() {
  const weeks = state.data.weeks;
  const week = weeks[state.weekIdx];
  const hasPrev = state.weekIdx > 0;
  const hasNext = state.weekIdx < weeks.length - 1;
  const isCurrent = isCurrentWeek(week);

  let h = '';

  // Phase label
  h += `<div class="subtitle">${week.phase}</div>`;

  // Nav bar
  h += `<div class="nav-bar">`;
  h += `<button class="nav-btn" onclick="navWeek(-1)" ${!hasPrev?'disabled':''}>\u2039</button>`;
  h += `<div class="nav-title">Week ${week.week} \u2014 ${week.weekDates}${isCurrent ? '<span class="now-badge">NOW</span>' : ''}</div>`;
  h += `<button class="nav-btn" onclick="navWeek(1)" ${!hasNext?'disabled':''}>\u203A</button>`;
  h += `</div>`;

  // Day cards
  week.days.forEach(day => { h += renderDayCard(day, false); });

  // Weekly summary
  if (week.weeklySummary) {
    const ws = week.weeklySummary;
    h += `<div class="weekly-summary">`;
    h += `<h3>${ws.title}</h3>`;
    h += `<p>${ws.content}</p>`;
    if (ws.changes) h += `<p style="margin-top:8px">${ws.changes}</p>`;
    if (ws.focus) h += `<p style="margin-top:8px">${ws.focus}</p>`;
    h += `</div>`;
  }

  // Weekly recap
  if (week.weeklyRecap) {
    const wr = week.weeklyRecap;
    h += `<div class="weekly-recap">`;
    h += `<h3>${wr.title}</h3>`;
    if (wr.bars && wr.bars.length) {
      const maxBar = Math.max(...wr.bars.map(b => b.count));
      h += `<div class="recap-bars">`;
      wr.bars.forEach(b => {
        const pct = maxBar > 0 ? Math.round((b.count / maxBar) * 100) : 0;
        const showInside = pct >= 25;
        h += `<div class="bar-row">`;
        h += `<div class="bar-label">${b.label}</div>`;
        h += `<div class="bar-track">`;
        h += `<div class="bar-fill ${b.sport}" style="width:${pct}%">`;
        if (showInside) h += `<span class="bar-val">${b.count}x</span>`;
        h += `</div></div>`;
        if (!showInside && b.count > 0) h += `<span class="bar-val-outside">${b.count}x</span>`;
        h += `</div>`;
      });
      h += `</div>`;
    }
    if (wr.totals && wr.totals.length) {
      h += `<div class="recap-totals">`;
      wr.totals.forEach(t => {
        h += `<div class="recap-total"><div class="stat-val">${t.value}</div><div class="stat-label">${t.label}</div></div>`;
      });
      h += `</div>`;
    }
    if (wr.highlights && wr.highlights.length) {
      h += `<ul class="recap-highlights">`;
      wr.highlights.forEach(item => { h += `<li>${item}</li>`; });
      h += `</ul>`;
    }
    if (wr.lookAhead) {
      h += `<div class="recap-note">${wr.lookAhead}</div>`;
    }
    h += `</div>`;
  }

  return h;
}

function navWeek(dir) {
  const next = state.weekIdx + dir;
  if (next >= 0 && next < state.data.weeks.length) {
    state.weekIdx = next;
    render();
  }
}

// ── MONTHLY VIEW ──
function renderMonthlyView() {
  const [year, month] = state.monthDate.split('-').map(Number);
  const today = todayISO();

  // Month nav bounds
  const dates = allDates();
  const minMonth = dates.length ? dates[0].slice(0,7) : state.monthDate;
  const maxMonth = dates.length ? dates[dates.length-1].slice(0,7) : state.monthDate;
  const hasPrev = state.monthDate > minMonth;
  const hasNext = state.monthDate < maxMonth;

  let h = '';

  // Nav bar
  h += `<div class="nav-bar">`;
  h += `<button class="nav-btn" onclick="navMonth(-1)" ${!hasPrev?'disabled':''}>\u2039</button>`;
  h += `<div class="nav-title">${formatMonthYear(state.monthDate)}</div>`;
  h += `<button class="nav-btn" onclick="navMonth(1)" ${!hasNext?'disabled':''}>\u203A</button>`;
  h += `</div>`;

  // Calendar grid
  h += '<div class="cal-grid">';

  // Headers (Mon-Sun)
  const dayLabels = ['M','T','W','T','F','S','S'];
  dayLabels.forEach(l => { h += `<div class="cal-header">${l}</div>`; });

  // First day of month
  const firstDay = new Date(year, month-1, 1);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

  // Empty cells before month starts
  for (let i = 0; i < startDow; i++) {
    h += '<div class="cal-cell empty"></div>';
  }

  // Days of month
  const daysInMonth = new Date(year, month, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dayData = findDayByDate(iso);
    const isToday = iso === today;
    const isSelected = iso === state.selectedDate;

    let classes = 'cal-cell';
    if (!dayData) classes += ' empty';
    if (isToday) classes += ' today';
    if (isSelected) classes += ' selected';
    if (dayData) {
      classes += ` sport-${dayData.sport}`;
      if (dayData.completed) classes += ' completed';
      if (dayData.missed) classes += ' missed';
    }

    h += `<div class="${classes}" onclick="selectCalDay('${iso}')">`;
    h += `<div class="cal-date">${d}</div>`;
    if (dayData) h += `<div class="cal-icon">${getIcon(dayData.sport)}</div>`;
    h += '</div>';
  }

  h += '</div>'; // end cal-grid

  // Selected day detail
  if (state.selectedDate) {
    const selDay = findDayByDate(state.selectedDate);
    if (selDay) {
      h += '<div class="cal-detail">';
      h += renderDayCard(selDay, true);
      h += '</div>';
    }
  }

  return h;
}

function selectCalDay(iso) {
  state.selectedDate = state.selectedDate === iso ? null : iso;
  render();
}

function navMonth(dir) {
  const [y,m] = state.monthDate.split('-').map(Number);
  let ny = y, nm = m + dir;
  if (nm < 1) { nm = 12; ny--; }
  if (nm > 12) { nm = 1; ny++; }
  state.monthDate = ny + '-' + String(nm).padStart(2,'0');
  state.selectedDate = null;
  render();
}

// ── LIBRARY VIEW ──
function renderLibraryView() {
  const lib = state.data.library;
  if (!lib || !lib.length) return '<div class="empty-state">No library yet</div>';

  // Group by category
  const groups = {};
  lib.forEach(item => {
    const c = item.category || 'Other';
    if (!groups[c]) groups[c] = [];
    groups[c].push(item);
  });

  let h = '';
  Object.keys(groups).forEach(cat => {
    h += `<div class="lib-cat">${cat}</div>`;
    groups[cat].forEach(card => {
      h += `<div class="lib-card" id="${card.id}" onclick="this.classList.toggle('open')">`;
      h += `<div class="lib-header">`;
      h += `<span class="lib-icon">${card.icon || '\u{1F4D6}'}</span>`;
      h += `<div class="lib-meta"><div class="lib-title">${card.title}</div>`;
      if (card.subtitle) h += `<div class="lib-sub">${card.subtitle}</div>`;
      h += `</div>`;
      h += `<span class="lib-arrow">›</span></div>`;
      h += `<div class="lib-body">`;
      (card.items || []).forEach(it => {
        h += `<div class="lib-item">`;
        h += `<div class="item-name">${it.name}</div>`;
        h += `<div class="item-rx">${it.prescription || ''}</div>`;
        if (it.notes) h += `<div class="item-notes">${it.notes}</div>`;
        h += `</div>`;
      });
      if (card.notes) h += `<div class="lib-notes">${card.notes}</div>`;
      h += `</div></div>`;
    });
  });
  return h;
}

// ── Load Data ──
const BUILT_VERSION = 16;

function fetchData() {
  return fetch(DATA_URL + '?v=' + Date.now())
    .then(r => r.json());
}

function refreshData() {
  fetchData().then(data => {
    // If version bumped, HTML/CSS may have changed — full reload
    if (data.version && data.version !== BUILT_VERSION) {
      window.location.href = window.location.pathname + '?refresh=' + Date.now();
      return;
    }
    // Otherwise just update data and re-render
    state.data = data;
    render();
  }).catch(() => {});
}

// Initial load — check version on first load too
fetchData()
  .then(data => {
    if (data.version && data.version !== BUILT_VERSION && !location.search.includes('refresh=')) {
      window.location.href = window.location.pathname + '?refresh=' + Date.now();
      return;
    }
    state.data = data;
    initState();
    render();
  })
  .catch(err => {
    document.getElementById('app').innerHTML = '<p style="color:#f44;text-align:center;padding:40px">Failed to load training data. Pull to refresh.</p>';
    console.error(err);
  });

// Auto-update: refresh data when app comes back to foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.data) refreshData();
});

// Also check every 5 minutes while open
setInterval(() => { if (state.data) refreshData(); }, 5 * 60 * 1000);
