<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BoscoTri">
<meta name="theme-color" content="#0a1a2e">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48cmVjdCBmaWxsPSclMjMxYTFhMmUnIHdpZHRoPScxMDAnIGhlaWdodD0nMTAwJyByeD0nMjAnLz48dGV4dCB5PSc4NScgeD0nNTAnIGZvbnQtc2l6ZT0nNTAnIHRleHQtYW5jaG9yPSdtaWRkbGUnPvCfj4o8L3RleHQ+PC9zdmc+">
<title>BoscoTri Training</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1a2e;padding:16px 16px 40px;color:#fff;max-width:500px;margin:0 auto;-webkit-user-select:none;user-select:none}

/* View Tabs */
.view-tabs{display:flex;background:#16213b;border-radius:12px;padding:3px;margin-bottom:14px;border:1px solid #1e3a5f}
.view-tab{flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;transition:all .2s;color:#667;letter-spacing:.5px;-webkit-tap-highlight-color:transparent}
.view-tab.active{background:#f97316;color:#fff}
.view-tab:not(.active):active{background:#1e3a5f}

/* Nav Bar */
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.nav-btn{width:40px;height:40px;border-radius:50%;background:#16213b;border:1px solid #1e3a5f;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .15s}
.nav-btn:active{background:#1e3a5f}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-title{font-size:15px;font-weight:700;text-align:center;flex:1}
.now-badge{display:inline-block;background:#f97316;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;margin-left:8px;vertical-align:middle;letter-spacing:.5px}

/* Shared */
.subtitle{font-size:12px;text-align:center;color:#f97316;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.week-label{text-align:center;font-size:13px;color:#8899aa;margin-bottom:8px}
.race-banner{background:linear-gradient(135deg,#f97316,#dc2626);border-radius:14px;padding:14px 16px;margin-bottom:16px;text-align:center}
.race-banner .race-name{font-weight:700;font-size:14px;color:#fff}
.race-banner .race-date{font-size:12px;color:rgba(255,255,255,.85)}
.race-banner .race-countdown{font-size:20px;font-weight:800;color:#fff;margin-top:4px}

/* Day Cards */
.day-card{background:#16213b;border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid #1e3a5f;transition:border-color .2s}
.day-card.today{border-color:#f97316;box-shadow:0 0 12px rgba(249,115,22,.15)}
.day-card.completed{opacity:.5}
.day-card.completed .day-header::after{content:"\2713";color:#22c55e;font-size:16px;margin-left:8px}
.day-card.injury{border-color:#f44444;box-shadow:0 0 8px rgba(239,68,68,.15)}
.day-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.day-header:active{background:#1e3a5f}
.day-left{display:flex;align-items:center;gap:10px}
.day-icon{font-size:20px}
.day-name{font-weight:700;font-size:15px}
.day-date{font-size:11px;color:#666;display:block}
.day-sport{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.5px}
.swim{background:#0ea5e9;color:#fff}
.bike{background:#a2c256;color:#fff}
.run{background:#f97316;color:#fff}
.rest{background:#6b7280;color:#fff}
.strength{background:#a855f7;color:#fff}
.changed{background:#a855f7;color:#fff}
.arrow{font-size:16px;color:#555;transition:transform .2s;margin-left:8px}
.day-card.open .arrow{transform:rotate(90deg)}
.day-details{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 16px}
.day-card.open .day-details{max-height:3000px;padding:0 16px 14px}
.workout-title{font-size:15px;font-weight:700;margin-bottom:4px;color:#fff}
.workout-meta{font-size:12px;color:#999;margin-bottom:8px}
.workout-sets{font-size:13px;line-height:1.7;color:#ccc;margin-bottom:4px}
.workout-sets li{margin-bottom:2px;list-style:none;padding-left:16px;position:relative}
.workout-sets li::before{content:"\203A";position:absolute;left:0;color:#f97316;font-size:11px;top:1px}
.equipment{font-size:11px;color:#777;margin-top:6px;border-top:1px solid #1e3a5f;display:flex;flex-wrap:wrap;gap:4px;padding-top:6px}
.equipment span{background:#1e3a5f;padding:2px 8px;border-radius:10px}
.note{font-size:12px;color:#9e9eb0;margin-top:8px;font-style:italic}
.injury-note{font-size:12px;color:#ef4444;margin-top:8px;font-style:italic}
.weekly-summary{background:#16213b;border-radius:14px;padding:16px;margin-top:20px;border:1px solid #1e3a5f}
.weekly-summary h3{font-size:13px;margin-bottom:8px;color:#f97316;letter-spacing:1px;text-transform:uppercase}
.weekly-summary p{font-size:13px;color:#999;line-height:1.6}
.weekly-recap{background:linear-gradient(135deg,#16213b,#1a2744);border-radius:14px;padding:16px;margin-top:12px;border:1px solid #22c55e33}
.weekly-recap h3{font-size:13px;margin-bottom:10px;color:#22c55e;letter-spacing:1px;text-transform:uppercase}
.weekly-recap .recap-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.weekly-recap .stat{background:#0a1a2e;border-radius:10px;padding:10px;text-align:center}
.weekly-recap .stat .stat-val{font-size:18px;font-weight:800;color:#fff}
.weekly-recap .stat .stat-label{font-size:10px;color:#889;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.weekly-recap .recap-highlights{font-size:13px;color:#ccc;line-height:1.7}
.weekly-recap .recap-highlights li{margin-bottom:4px;list-style:none;padding-left:16px;position:relative}
.weekly-recap .recap-highlights li::before{content:"\2022";position:absolute;left:0;color:#22c55e;font-size:14px;top:0}
.weekly-recap .recap-note{font-size:12px;color:#f97316;margin-top:10px;font-style:italic;border-top:1px solid #1e3a5f;padding-top:8px}
.change-tag{font-size:10px;background:#a855f7;color:#fff;padding:2px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
.badge-row{display:flex;align-items:center;gap:6px}

/* Daily View - expanded card */
.daily-view .day-card{border-width:2px}
.daily-view .day-card .day-details{max-height:3000px;padding:0 16px 14px}
.daily-view .day-card .arrow{display:none}
.daily-view .day-icon{font-size:36px}
.daily-view .day-name{font-size:18px}
.empty-state{text-align:center;padding:40px 20px;color:#556;font-size:14px}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

/* Monthly Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.cal-header{font-size:11px;color:#556;text-align:center;padding:4px 0;font-weight:700}
.cal-cell{background:#16213b;border-radius:10px;min-height:52px;padding:4px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative}
.cal-cell:active{background:#1e3a5f}
.cal-cell.empty{background:transparent;cursor:default}
.cal-cell.empty:active{background:transparent}
.cal-cell .cal-date{font-size:12px;font-weight:700;color:#889;margin-bottom:2px}
.cal-cell .cal-icon{font-size:16px}
.cal-cell.today{border-color:#f97316;box-shadow:0 0 8px rgba(249,115,22,.2)}
.cal-cell.today .cal-date{color:#f97316}
.cal-cell.selected{background:#1e3a5f}
.cal-cell.sport-swim{border-color:#0ea5e9}
.cal-cell.sport-bike{border-color:#a2c256}
.cal-cell.sport-run{border-color:#f97316}
.cal-cell.sport-rest{border-color:#6b7280}
.cal-cell.sport-strength{border-color:#a855f7}
.cal-cell.today.sport-swim,.cal-cell.today.sport-bike,.cal-cell.today.sport-run{border-color:#f97316}
.cal-cell.completed{opacity:.6}
.cal-detail{margin-top:8px}

#loading{text-align:center;padding:40px;color:#666}
</style>
</head>
<body>

<h1 style="text-align:center;font-size:22px;margin-bottom:2px">BOSCO'S TRAINING</h1>
<div id="app"><div id="loading">Loading training data...</div></div>

<script>
const DATA_URL = 'data.json';

// ── State ──
const state = {
  view: 'week',       // day | week | month
  weekIdx: 0,         // index into weeks[]
  dayDate: null,       // ISO date string for daily view
  monthDate: null,     // "YYYY-MM" for month view
  selectedDate: null,  // ISO date tapped in calendar
  data: null
};

// ── Helpers ──
function getIcon(sport) {
  const icons = {swim:'\u{1F3CA}',bike:'\u{1F6B4}',run:'\u{1F3C3}',rest:'\u{1F319}',strength:'\u{1F4AA}'};
  return icons[sport] || '\u{1F4AA}';
}

function daysUntil(dateStr) {
  const diff = new Date(dateStr + 'T00:00:00') - new Date();
  return Math.max(0, Math.ceil(diff / (1000*60*60*24)));
}

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseISO(s) { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }

function formatLongDate(iso) {
  const d = parseISO(iso);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
}

function formatMonthYear(ym) {
  const [y,m] = ym.split('-').map(Number);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[m-1] + ' ' + y;
}

function allDays() {
  const days = [];
  if (!state.data) return days;
  state.data.weeks.forEach(w => w.days.forEach(d => days.push(d)));
  return days;
}

function findDayByDate(iso) {
  return allDays().find(d => d.isoDate === iso) || null;
}

function allDates() {
  return allDays().map(d => d.isoDate);
}

function isCurrentWeek(week) {
  const today = todayISO();
  return week.days.some(d => d.isoDate === today);
}

// ── Hash Persistence ──
function readHash() {
  const h = location.hash.slice(1);
  if (h === 'day' || h === 'week' || h === 'month') state.view = h;
}

function writeHash() {
  location.hash = state.view;
}

// ── Init State ──
function initState() {
  const today = todayISO();
  const weeks = state.data.weeks;

  // Find current week
  let cwIdx = weeks.findIndex(w => isCurrentWeek(w));
  if (cwIdx === -1) cwIdx = 0;
  state.weekIdx = cwIdx;
  state.dayDate = today;

  const td = new Date();
  state.monthDate = td.getFullYear() + '-' + String(td.getMonth()+1).padStart(2,'0');
  state.selectedDate = null;

  readHash();
}

// ── Render Dispatch ──
function render() {
  const app = document.getElementById('app');
  let html = '';

  // View tabs
  html += renderTabs();

  // Race banner (always shown)
  html += renderRaceBanner();

  if (state.view === 'day') html += renderDailyView();
  else if (state.view === 'week') html += renderWeeklyView();
  else if (state.view === 'month') html += renderMonthlyView();

  app.innerHTML = html;
  writeHash();
}

// ── View Tabs ──
function renderTabs() {
  const tabs = ['day','week','month'];
  let h = '<div class="view-tabs">';
  tabs.forEach(t => {
    const active = state.view === t ? ' active' : '';
    const label = t.charAt(0).toUpperCase() + t.slice(1);
    h += `<div class="view-tab${active}" onclick="switchView('${t}')">${label}</div>`;
  });
  h += '</div>';
  return h;
}

function switchView(v) {
  state.view = v;

  // Sync: if switching to week from day, jump to the week containing dayDate
  if (v === 'week' && state.dayDate) {
    const idx = state.data.weeks.findIndex(w => w.days.some(d => d.isoDate === state.dayDate));
    if (idx !== -1) state.weekIdx = idx;
  }
  // If switching to day from week, pick first day of current week (or today if in week)
  if (v === 'day') {
    const week = state.data.weeks[state.weekIdx];
    const today = todayISO();
    const todayInWeek = week.days.find(d => d.isoDate === today);
    state.dayDate = todayInWeek ? today : week.days[0].isoDate;
  }
  // If switching to month from day, sync month
  if (v === 'month' && state.dayDate) {
    state.monthDate = state.dayDate.slice(0,7);
  }

  render();
}

// ── Race Banner ──
function renderRaceBanner() {
  const races = state.data.races;
  if (!races || !races.length) return '';
  const r = races[0];
  return `<div class="race-banner">
    <div class="race-name">${r.name}</div>
    <div class="race-date">${r.type} \u00B7 ${r.date.split('-')[0]}</div>
    <div class="race-countdown">${daysUntil(r.date)} days to go</div>
  </div>`;
}

// ── Day Card HTML (shared) ──
function renderDayCard(day, forceOpen) {
  const today = todayISO();
  const isToday = day.isoDate === today;
  const todayClass = isToday ? ' today' : '';
  const completedClass = day.completed ? ' completed' : '';
  const injuryClass = day.injury ? ' injury' : '';
  const openClass = (forceOpen || isToday) ? ' open' : '';

  let h = `<div class="day-card${todayClass}${completedClass}${injuryClass}${openClass}" id="${day.id}" onclick="this.classList.toggle('open')">`;
  h += `<div class="day-header">`;
  h += `<div class="day-left"><span class="day-icon">${getIcon(day.sport)}</span><div><span class="day-name">${day.name}</span><span class="day-date">${day.date}</span></div></div>`;
  h += `<div class="badge-row">`;
  h += `<span class="day-sport ${day.sport}">${day.sportLabel}</span>`;
  if (day.secondSportLabel) {
    h += `<span class="day-sport ${day.secondSport}">${day.secondSportLabel}</span>`;
  }
  if (day.changed) {
    h += `<span class="day-sport changed">CHANGED</span>`;
  }
  h += `<span class="arrow">\u203A</span></div>`;
  h += `</div>`;

  h += `<div class="day-details">`;
  const w = day.workout;
  h += `<div class="workout-title">${w.title}</div>`;
  h += `<div class="workout-meta">${w.meta}</div>`;
  if (w.sets && w.sets.length) {
    h += `<ul class="workout-sets">`;
    w.sets.forEach(s => { h += `<li>${s}</li>`; });
    h += `</ul>`;
  }
  if (w.equipment && w.equipment.length) {
    h += `<div class="equipment">`;
    w.equipment.forEach(e => { h += `<span>${e}</span>`; });
    h += `</div>`;
  }
  if (w.note) {
    const noteClass = day.injury ? 'injury-note' : 'note';
    h += `<div class="${noteClass}">${w.note}</div>`;
  }
  h += `</div></div>`;
  return h;
}

// ── DAILY VIEW ──
function renderDailyView() {
  const all = allDays();
  const idx = all.findIndex(d => d.isoDate === state.dayDate);
  const day = idx !== -1 ? all[idx] : null;
  const hasPrev = idx > 0;
  const hasNext = idx < all.length - 1;

  let h = '<div class="daily-view">';

  // Nav bar
  h += `<div class="nav-bar">`;
  h += `<button class="nav-btn" onclick="navDay(-1)" ${!hasPrev?'disabled':''}>\u2039</button>`;
  h += `<div class="nav-title">${day ? formatLongDate(day.isoDate) : state.dayDate}</div>`;
  h += `<button class="nav-btn" onclick="navDay(1)" ${!hasNext?'disabled':''}>\u203A</button>`;
  h += `</div>`;

  if (day) {
    h += renderDayCard(day, true);
  } else {
    h += `<div class="empty-state"><div class="empty-icon">\u{1F319}</div><div>No workout scheduled</div></div>`;
  }

  h += '</div>';
  return h;
}

function navDay(dir) {
  const all = allDays();
  const idx = all.findIndex(d => d.isoDate === state.dayDate);
  const next = idx + dir;
  if (next >= 0 && next < all.length) {
    state.dayDate = all[next].isoDate;
    render();
  }
}

// ── WEEKLY VIEW ──
function renderWeeklyView() {
  const weeks = state.data.weeks;
  const week = weeks[state.weekIdx];
  const hasPrev = state.weekIdx > 0;
  const hasNext = state.weekIdx < weeks.length - 1;
  const isCurrent = isCurrentWeek(week);

  let h = '';

  // Phase label
  h += `<div class="subtitle">${week.phase}</div>`;

  // Nav bar
  h += `<div class="nav-bar">`;
  h += `<button class="nav-btn" onclick="navWeek(-1)" ${!hasPrev?'disabled':''}>\u2039</button>`;
  h += `<div class="nav-title">Week ${week.week} \u2014 ${week.weekDates}${isCurrent ? '<span class="now-badge">NOW</span>' : ''}</div>`;
  h += `<button class="nav-btn" onclick="navWeek(1)" ${!hasNext?'disabled':''}>\u203A</button>`;
  h += `</div>`;

  // Day cards
  week.days.forEach(day => { h += renderDayCard(day, false); });

  // Weekly summary
  if (week.weeklySummary) {
    const ws = week.weeklySummary;
    h += `<div class="weekly-summary">`;
    h += `<h3>${ws.title}</h3>`;
    h += `<p>${ws.content}</p>`;
    if (ws.changes) h += `<p style="margin-top:8px">${ws.changes}</p>`;
    if (ws.focus) h += `<p style="margin-top:8px">${ws.focus}</p>`;
    h += `</div>`;
  }

  // Weekly recap
  if (week.weeklyRecap) {
    const wr = week.weeklyRecap;
    h += `<div class="weekly-recap">`;
    h += `<h3>${wr.title}</h3>`;
    if (wr.stats && wr.stats.length) {
      h += `<div class="recap-stats">`;
      wr.stats.forEach(s => {
        h += `<div class="stat"><div class="stat-val">${s.value}</div><div class="stat-label">${s.label}</div></div>`;
      });
      h += `</div>`;
    }
    if (wr.highlights && wr.highlights.length) {
      h += `<ul class="recap-highlights">`;
      wr.highlights.forEach(item => { h += `<li>${item}</li>`; });
      h += `</ul>`;
    }
    if (wr.lookAhead) {
      h += `<div class="recap-note">${wr.lookAhead}</div>`;
    }
    h += `</div>`;
  }

  return h;
}

function navWeek(dir) {
  const next = state.weekIdx + dir;
  if (next >= 0 && next < state.data.weeks.length) {
    state.weekIdx = next;
    render();
  }
}

// ── MONTHLY VIEW ──
function renderMonthlyView() {
  const [year, month] = state.monthDate.split('-').map(Number);
  const today = todayISO();

  // Month nav bounds
  const dates = allDates();
  const minMonth = dates.length ? dates[0].slice(0,7) : state.monthDate;
  const maxMonth = dates.length ? dates[dates.length-1].slice(0,7) : state.monthDate;
  const hasPrev = state.monthDate > minMonth;
  const hasNext = state.monthDate < maxMonth;

  let h = '';

  // Nav bar
  h += `<div class="nav-bar">`;
  h += `<button class="nav-btn" onclick="navMonth(-1)" ${!hasPrev?'disabled':''}>\u2039</button>`;
  h += `<div class="nav-title">${formatMonthYear(state.monthDate)}</div>`;
  h += `<button class="nav-btn" onclick="navMonth(1)" ${!hasNext?'disabled':''}>\u203A</button>`;
  h += `</div>`;

  // Calendar grid
  h += '<div class="cal-grid">';

  // Headers (Mon-Sun)
  const dayLabels = ['M','T','W','T','F','S','S'];
  dayLabels.forEach(l => { h += `<div class="cal-header">${l}</div>`; });

  // First day of month
  const firstDay = new Date(year, month-1, 1);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0

  // Empty cells before month starts
  for (let i = 0; i < startDow; i++) {
    h += '<div class="cal-cell empty"></div>';
  }

  // Days of month
  const daysInMonth = new Date(year, month, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dayData = findDayByDate(iso);
    const isToday = iso === today;
    const isSelected = iso === state.selectedDate;

    let classes = 'cal-cell';
    if (!dayData) classes += ' empty';
    if (isToday) classes += ' today';
    if (isSelected) classes += ' selected';
    if (dayData) {
      classes += ` sport-${dayData.sport}`;
      if (dayData.completed) classes += ' completed';
    }

    h += `<div class="${classes}" onclick="selectCalDay('${iso}')">`;
    h += `<div class="cal-date">${d}</div>`;
    if (dayData) h += `<div class="cal-icon">${getIcon(dayData.sport)}</div>`;
    h += '</div>';
  }

  h += '</div>'; // end cal-grid

  // Selected day detail
  if (state.selectedDate) {
    const selDay = findDayByDate(state.selectedDate);
    if (selDay) {
      h += '<div class="cal-detail">';
      h += renderDayCard(selDay, true);
      h += '</div>';
    }
  }

  return h;
}

function selectCalDay(iso) {
  state.selectedDate = state.selectedDate === iso ? null : iso;
  render();
}

function navMonth(dir) {
  const [y,m] = state.monthDate.split('-').map(Number);
  let ny = y, nm = m + dir;
  if (nm < 1) { nm = 12; ny--; }
  if (nm > 12) { nm = 1; ny++; }
  state.monthDate = ny + '-' + String(nm).padStart(2,'0');
  state.selectedDate = null;
  render();
}

// ── Load Data ──
const BUILT_VERSION = 6;

function fetchData() {
  return fetch(DATA_URL + '?v=' + Date.now())
    .then(r => r.json());
}

function refreshData() {
  fetchData().then(data => {
    // If version bumped, HTML/CSS may have changed — full reload
    if (data.version && data.version !== BUILT_VERSION) {
      window.location.href = window.location.pathname + '?refresh=' + Date.now();
      return;
    }
    // Otherwise just update data and re-render
    state.data = data;
    render();
  }).catch(() => {});
}

// Initial load
fetchData()
  .then(data => {
    state.data = data;
    initState();
    render();
  })
  .catch(err => {
    document.getElementById('app').innerHTML = '<p style="color:#f44;text-align:center;padding:40px">Failed to load training data. Pull to refresh.</p>';
    console.error(err);
  });

// Auto-update: refresh data when app comes back to foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.data) refreshData();
});

// Also check every 5 minutes while open
setInterval(() => { if (state.data) refreshData(); }, 5 * 60 * 1000);
</script>
</body>
</html>
